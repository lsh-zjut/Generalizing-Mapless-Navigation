jackal_joint_publisher:
  type: joint_state_controller/JointStateController
  publish_rate: 50

jackal_velocity_controller:
  type: diff_drive_controller/DiffDriveController
  publish_rate: 50
  left_wheel:
    - front_left_wheel
    - rear_left_wheel
  right_wheel:
    - front_right_wheel
    - rear_right_wheel
  wheel_separation: 0.37559
  wheel_radius: 0.098
  base_frame_id: base_link
  enable_odom_tf: false
  cmd_vel_timeout: 0.25
  velocity_rolling_window_size: 2
  pose_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.03]
  twist_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.03]
  linear:
    x:
      has_velocity_limits: true
      max_velocity: 2.0
      min_velocity: -2.0
      has_acceleration_limits: true
      max_acceleration: 2.0
  angular:
    z:
      has_velocity_limits: true
      max_velocity: 4.0
      min_velocity: -4.0
      has_acceleration_limits: true
      max_acceleration: 6.0

gazebo_ros_control:
  pid_gains:
    front_left_wheel: {p: 100.0, i: 0.0, d: 1.0}
    front_right_wheel: {p: 100.0, i: 0.0, d: 1.0}
    rear_left_wheel: {p: 100.0, i: 0.0, d: 1.0}
    rear_right_wheel: {p: 100.0, i: 0.0, d: 1.0}
